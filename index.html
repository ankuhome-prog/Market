<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0056b3">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="icon" href="logos/rupee.png" type="image/png">
  <meta charset="UTF-8">
  <title>Market</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Global Styles */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f1f2f6;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Search Bar Area */
    .search-container {
      display: flex;
      align-items: center;
      width: 90vw;
      max-width: 650px;
      border: 1px solid #ccc;
      border-radius: 20px;
      padding: 5px 12px;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
      margin-top: 20vh;
      transition: all 0.3s ease;
      box-sizing: border-box;
      z-index: 10;
    }
    .search-container:focus-within {
      box-shadow: 0 5px 20px rgba(0,0,0,0.11);
      border-color: #0056b3;
      max-width: 700px;
    }
    .search-container input {
      border: none;
      outline: none;
      padding: 8px;
      width: 100%;
      font-size: 16px;
      background: transparent;
    }
    .search-icon {
      width: 20px;
      height: 20px;
      fill: #888;
      margin-right: 8px;
    }

    /* Links Container Section */
    .links-container {
      margin-top: 15px;
      display: flex;
      gap: 20px; /* Spacing between the links */
    }

    /* Shared Link Styles */
    .market-link {
      text-decoration: none;
      color: #0056b3;
      font-size: 14px;
      font-weight: 600;
      transition: opacity 0.2s ease;
    }
    .market-link:hover {
      text-decoration: underline;
      opacity: 0.8;
    }
</style>
</head>
<body>

  <div class="search-container">
    <svg class="search-icon" viewBox="0 0 24 24">
      <path d="M10 2a8 8 0 105.29 14.71l5 5a1 1 0 001.42-1.42l-5-5A8 8 0 0010 2zm0 2a6 6 0 110 12A6 6 0 0110 4z"/>
    </svg>
    <input type="text" placeholder="Search your holdings...">
  </div>

  <div class="links-container">
    <a href="all-holdings.html" class="market-link">View All Holdings</a>
    <a href="mutual-fund.html" class="market-link">Mutual Funds</a>
    <a href="bets.html" class="market-link">Bets</a>
  </div>

  <script src="search.js"></script>
</body>
</html>
