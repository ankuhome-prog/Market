<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="logos/icons/holding.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holding</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-gold: #c1a35f;
            --text-main: #2d3436;
            --text-light: #636e72;
            --bg-card: #ffffff;
            --bg-soft: #f8f9fa;
            --border-color: #edf2f7;
        }

        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            
            /* Prevent text selection and image dragging globally */
            -webkit-user-select: none;  /* Safari */
            -moz-user-select: none;     /* Firefox */
            -ms-user-select: none;      /* IE10+/Edge */
            user-select: none;          /* Standard */
        }

        /* Ensure images inside the document cannot be dragged */
        img {
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            user-drag: none;
        }

        .page-wrapper {
            display: flex;
            align-items: center; 
            justify-content: center;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Changes layout container direction to column so the master ticker can stretch fully across the top */
        .cards-container {
            display: flex;
            flex-direction: column;
            align-items: center;    /* Essential to lock the ticker and row to the same center axis */
            justify-content: center;
            width: max-content;
            max-width: 100%;
            position: relative;
            gap: 20px;
        }

        /* Keeps the 3 distinct data columns structurally aligned horizontally side-by-side */
        .columns-horizontal-wrapper {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: 24px;
            width: 100%;
        }

        /* Base Card Styles */
        .projection-card, .identity-card, .graph-card, .card, .ticker-panel-card {
            background: var(--bg-card);
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .projection-card { width: 320px; padding: 24px; }
        .identity-card { width: 320px; padding: 22px; padding-bottom: 5px; }
        .graph-card { width: 350px; padding: 24px; }
        .card { width: 500px; padding: 32px; padding-bottom: 13px; }

        /* The Ticker block now takes 100% width of the main wrapper container */
        /* Find this block and update it */
        .ticker-panel-card {
            width: 1218px;
            padding: 6px 10px;
            box-sizing: border-box;
            margin: 0;
            transform: translateX(-42px); /* Shifts the banner perfectly to the left to match the cards line */
        }

        .monthly-returns-ticker-wrap {
            width: 100%;
            overflow: hidden;
            background: transparent;
            border-radius: 16px;
            padding: 4px 0;
            box-sizing: border-box;
            position: relative;
        }

        .monthly-returns-ticker {
            display: flex;
            width: max-content;
            will-change: transform; /* Optimizes browser rendering for smooth motion */
        }
              

        .ticker-item {
            display: flex;
            align-items: center;
            padding: 0 32px;
            font-family: 'Segoe UI', monospace;
            font-size: 14px;
            font-weight: 700;
            border-right: none;
            white-space: nowrap;
        }

        .ticker-month {
            color: #94a3b8;
            margin-right: 6px;
        }

        .left-column, .right-column, .center-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .identity-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
        }

        #hq-location {
            font-size: 14px;
            color: var(--text-light);
            font-weight: 500;
            margin-bottom: 12px;
        }

        .divider { border: none; border-top: 1.5px dashed black; margin: 10px 0; width: 100%; }

        .info-block { margin-bottom: 16px; }
        .info-block label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 800;
            color: var(--primary-gold);
            margin-bottom: 2px;
            letter-spacing: 1px;
        }

        .info-content { font-size: 13px; font-weight: 500; line-height: 1.2; color: gray; }

        .projection-card label, .graph-card label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-light);
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .projection-title { font-size: 18px; color: var(--text-main); margin-bottom: 15px; line-height: 1.4; }
        .year-highlight { color: var(--primary-gold); font-weight: 800; }
        .projection-card input[type="range"] { width: 100%; accent-color: var(--primary-gold); cursor: pointer; }

        .card-header { text-align: center; margin-bottom: 20px; }
        .logo-box img { max-height: 120px; max-width: 100%; margin-bottom: 12px; object-fit: contain; }
        h1 { color: var(--text-main); font-size: clamp(20px, 4vw, 26px); margin: 0; letter-spacing: -0.5px; }
        
        .ticker-badge { 
            display: inline-block; 
            background: var(--bg-soft); 
            color: var(--text-light); 
            padding: 4px 12px; 
            border-radius: 8px; 
            font-size: 14px; 
            font-weight: 600; 
            margin-top: 8px; 
        }

        .sector-badge {
            display: inline-block;
            background: #e1f5fe;
            color: #0288d1;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 8px;
            margin-left: 5px;
        }

        .info-table { border: 1px solid var(--border-color); border-radius: 16px; overflow: hidden; }
        .table-caption { background: var(--bg-soft); padding: 7px; text-align: center; font-size: 12px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border-color); }
        .grid-row { display: flex; border-bottom: 1px solid var(--border-color); }
        .footer-row { border-bottom: none; background-color: #fafbfc; align-items: center; }
        
        .outlook-container { margin-top: 10px; text-align: center; font-size: 13px; font-weight: 500; color: var(--text-light); }

        .item { flex: 1; padding: 16px 8px; min-width: 0; }
        .item label { display: block; font-size: 11px; color: var(--text-light); margin-bottom: 4px; }
        .item .value { font-size: 14px; font-weight: 600; color: var(--text-main); }

        .broker-banner { max-height: 18px; max-width: 80%; display: block; margin-top: 2px; object-fit: contain; }
        
        /* Compact Returns Styling */
        .returns-scroll-container {
            max-height: 200px; 
            overflow-y: auto;
            padding-right: 4px;
        }
        .returns-scroll-container::-webkit-scrollbar { width: 4px; }
        .returns-scroll-container::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 10px;
        }

        .calendar-item {
            background: white;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .cal-year {
            font-size: 9px;
            font-weight: 800;
            padding: 4px 0;
            background: var(--bg-soft);
            color: var(--text-light);
            border-bottom: 1px solid var(--border-color);
        }

        .cal-perc {
            padding: 8px 0;
            font-size: 11px;
            font-weight: 700;
        }

        .calendar-item.positive .cal-year { background: #e8f5e9; color: #2e7d32; }
        .calendar-item.negative .cal-year { background: #ffebee; color: #c62828; }

        /* Sidebar Layout Setup */
        .nav-sidebar { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            margin-left: 20px;
            justify-content: center;
            align-self: center;
            height: 100%;
        }
        
        .nav-btn { width: 38px; height: 38px; border-radius: 50%; border: none; background: var(--bg-card); display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); transition: all 0.3s ease; text-decoration: none; box-sizing: border-box; }
        .nav-btn img { width: 30px; height: 30px; object-fit: contain; }

        .center { text-align: center; }
        .right { text-align: right; }
        .positive { color: #27ae60 !important; }
        .negative { color: #e74c3c !important; }
        .highlight { color: var(--primary-gold); }

        .chart-container { height: 120px; width: 100%; margin-top: 10px; }
        .range-btn {
            background: var(--bg-soft);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.2s;
        }

        .range-btn.active {
            background: var(--primary-gold);
            color: white;
            border-color: var(--primary-gold);
        }

        .logo-box a { display: inline-block; border: none; outline: none; }
        .logo-box img { cursor: pointer; transition: transform 0.2s ease; }
        .logo-box img:hover { transform: scale(1.03); }

        /* Label Container Layout */
        .label-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .label-container label { margin-bottom: 0; }

        /* i Button / Tooltip Styling */
        .tooltip-container {
            position: relative;
            display: inline-block;
            cursor: pointer;
        }

        .info-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            font-style: normal;
        }

        .tooltip-text {
            visibility: hidden;
            width: 250px;
            background-color: #2d3436;
            color: #fff;
            text-align: left;
            border-radius: 8px;
            padding: 8px 10px;
            position: absolute;
            z-index: 10;
            bottom: 125%; 
            right: 0;
            margin-bottom: 5px;
            opacity: 0;
            transition: opacity 0.2s ease;
            font-size: 15px;
            font-weight: 500;
            line-height: 1.3;
            text-transform: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.155);
        }

        /* Tooltip Arrow */
        .tooltip-text::after {
            content: "";
            position: absolute;
            top: 100%;
            right: 5px;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #2d3436 transparent transparent transparent;
        }

        .tooltip-container:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }

        .search-trigger-btn svg {
            width: 18px;
            height: 18px;
            fill: var(--text-light);
            transition: fill 0.2s;
        }
        .search-trigger-btn:hover svg {
            fill: var(--primary-gold);
        }

        /* Glassmorphic Centered Search Modal Box Overlay Styles */
        .search-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(45, 52, 54, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 5000;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            padding-top: 15vh;
            box-sizing: border-box;
        }

        .search-modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .search-container-box {
            width: 90vw;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            padding: 8px 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            position: relative;
            box-sizing: border-box;
            transform: translateY(-20px);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .search-modal-overlay.active .search-container-box {
            transform: translateY(0);
        }

        .search-container-box svg {
            width: 22px;
            height: 22px;
            fill: var(--text-light);
            margin-right: 12px;
            flex-shrink: 0;
        }

        .search-container-box input[type="text"] {
            width: 100%;
            height: 30px;
            border: none;
            outline: none;
            background: transparent;
            font-size: 16px;
            font-family: inherit;
            color: var(--text-main);
            box-sizing: border-box;
        }

        .search-container-box input[type="text"]::placeholder {
            color: #a0aec0;
        }
        
        @media (max-width: 1400px) {
            .cards-container { width: 100%; }
            .columns-horizontal-wrapper { flex-direction: column; align-items: center; gap: 20px; width: 100%; }
            .left-column, .right-column, .center-column { width: 100%; display: contents; }
            
            /* Responsive Layout Stack Modifiers */
            #cagr-selector-card { 
                order: 2; 
                width: 100%; 
                max-width: 500px; 
                position: relative; 
            }
            #projection-card { 
                order: 2; 
                margin-top: 0px; 
            }
            
            .card { order: 1; }
            #ticker-panel-card, .ticker-panel-card { 
                order: -1; 
                width: 100%;             /* Allow it to match the width of the other stacked cards */
                max-width: 500px;        /* Limits width to look uniform with your responsive stack */
                transform: none;         /* Clears the desktop -42px shift causing the cutoff */
                margin: 0 auto;          /* Centers it perfectly within the layout */
                box-sizing: border-box;
            }
            #graph-card { order: 3; }
            #returns-card { order: 4; }
            #identity-card { order: 5; }
            .projection-card, .card, .identity-card, .graph-card, .ticker-panel-card { width: 100%; height: auto; max-width: 500px; position: relative; }
            .nav-sidebar { position: fixed; right: 15px; top: 50%; transform: translateY(-50%); margin-left: 0; z-index: 1000; height: auto; }
        }

        /* Continuous Horizontal Row Layout - Static View Only */
        .cagr-bubble-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            gap: 4px;
            margin-top: 2px;
            box-sizing: border-box;
        }
        
        .cagr-bubble {
            background: var(--bg-soft);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 6px 4px;
            font-size: 12px;
            color: var(--text-main);
            cursor: default; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            flex: 1;
            min-width: 0;
            box-sizing: border-box;
        }
        
        .cagr-bubble .bubble-label {
            color: var(--text-light);
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .cagr-bubble .bubble-val {
            font-weight: 700;
            white-space: nowrap;
        }

        .cagr-card-spinner {
            width: 10px;
            height: 10px;
            border: 1.5px solid var(--border-color);
            border-top-color: var(--primary-gold);
            border-radius: 50%;
            animation: inner-spin 0.6s linear infinite;
            display: inline-block;
        }
        @keyframes inner-spin {
            to { transform: rotate(360deg); }
        }

        .ui-disabled {
            pointer-events: none !important;
            opacity: 0.6 !important;
        }
    </style>
</head>
<body>

    <div class="search-modal-overlay" id="searchModalOverlay">
        <div class="search-container-box search-container" id="searchWrapper">
            <svg viewBox="0 0 24 24">
                <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
            <input type="text" id="searchInput" placeholder="Search your holdings..." autocomplete="off">
        </div>
    </div>

    <div class="page-wrapper">
        <div class="cards-container">
            
            <div id="ticker-panel-card" class="ticker-panel-card" style="display: none;">
                <div class="monthly-returns-ticker-wrap">
                    <div class="monthly-returns-ticker" id="monthlyReturnsTicker"></div>
                </div>
            </div>

            <div class="columns-horizontal-wrapper">
                
                <div class="left-column">
                    <div id="cagr-selector-card" class="projection-card" style="display: none; padding: 20px; margin-bottom: -4px;">
                        <label style="margin-bottom: 10px;">CAGR OVER THE YEARS</label>
                        
                        <div id="cagr-fetch-prompt-container" style="display: flex; width: 100%; box-sizing: border-box;">
                            <button id="fetch-live-cagr-btn" onclick="triggerLiveCagrFetchManual()" style="width: 100%; height: 38px; border-radius: 12px; border: 1px dashed var(--primary-gold); background: var(--bg-soft); color: var(--primary-gold); font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: inherit; transition: background 0.2s, color 0.2s;">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                                Fetch Live CAGR
                            </button>
                        </div>

                        <div id="cagr-interactive-selector-container" style="display: none; position: relative; width: 100%;">
                            <div class="cagr-bubble-row" id="cagr-bubble-container">
                                <div class="cagr-bubble" data-value="5"><span class="bubble-label">5Y</span><span class="bubble-val" id="bval-5">--</span></div>
                                <div class="cagr-bubble" data-value="10"><span class="bubble-label">10Y</span><span class="bubble-val" id="bval-10">--</span></div>
                                <div class="cagr-bubble" data-value="15"><span class="bubble-label">15Y</span><span class="bubble-val" id="bval-15">--</span></div>
                                <div class="cagr-bubble" data-value="20"><span class="bubble-label">20Y</span><span class="bubble-val" id="bval-20">--</span></div>
                                <div class="cagr-bubble" data-value="25"><span class="bubble-label">25Y</span><span class="bubble-val" id="bval-25">--</span></div>
                                <div class="cagr-bubble" data-value="30"><span class="bubble-label">30Y</span><span class="bubble-val" id="bval-30">--</span></div>
                            </div>
                        </div>
                    </div>

                    <div id="projection-card" class="projection-card" style="display: none;">
                        <label>Investment Projection</label>
                        <div id="projection-content">
                            <div class="projection-title">
                                In <span id="year-val" class="year-highlight">5</span> years, you will have<br>
                                <span class="highlight">₹ </span><span id="future-amt" class="highlight">0</span>
                            </div>
                            <input type="range" id="year-slider" min="1" max="30" value="5" oninput="updateProjection()">
                            <div style="display:flex; justify-content: space-between; font-size: 10px; color: var(--text-light); margin-top: 8px;">
                                <span>1 Year</span>
                                <span>30 Years</span>
                            </div>
                        </div>
                        <div id="projection-na" style="display:none; text-align: center; padding: 10px 0;">
                            <h2 class="negative">N/A</h2>
                            <p style="font-size: 12px; color: var(--text-light);">Projection unavailable.</p>
                        </div>
                    </div>

                    <div id="identity-card" class="identity-card" style="display: none;">
                        <div class="identity-header">
                            <img id="nation-flag" src="" alt="" style="width: 28px; height: auto; border-radius: 3px; display: none;" draggable="false">
                            <span id="nation-name"></span>
                        </div>
                        <div id="hq-location"></div>
                        <hr class="divider">
                        <div class="info-block">
                            <label>About</label>
                            <div id="stock-about" class="info-content"></div>
                        </div>
                        <div class="info-block">
                            <label>Products & Services</label>
                            <div id="stock-products" class="info-content"></div>
                        </div>
                    </div>
                </div>

                <div class="center-column">
                    <div class="card">
                        <div id="main-container" class="card-content">
                            <div class="card-header">
                                <h1>Loading...</h1>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="right-column">
                    <div id="graph-card" class="graph-card" style="display: none;">
                        <label>Rank History</label>
                        <div class="chart-container">
                            <canvas id="mcapChart"></canvas>
                        </div>
                        <div class="range-selector" style="display: flex; gap: 8px; justify-content: center; margin-top: 15px;">
                            <button class="range-btn" onclick="filterChart(6)">6M</button>
                            <button class="range-btn" onclick="filterChart(12)">1Y</button>
                            <button class="range-btn" onclick="filterChart(60)">5Y</button>
                            <button class="range-btn" onclick="filterChart('all')">ALL</button>
                        </div>
                    </div>

                    <div id="returns-card" class="graph-card" style="display: none;">
                        <div class="label-container">
                            <label>Yearly Returns (%)</label>
                            <div class="tooltip-container">
                                <i class="info-icon">ⓘ</i>
                                <span class="tooltip-text">Yearly returns are available till MCAP Rank: 1000.</span>
                            </div>
                        </div>
                        <div class="returns-scroll-container">
                            <div id="returns-grid" class="calendar-grid"></div>
                        </div>
                    </div>
                </div>

                <div class="nav-sidebar" id="main-nav-sidebar">
                    <button class="nav-btn search-trigger-btn" id="searchTrigger" title="Search Holdings">
                        <svg viewBox="0 0 24 24">
                            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                        </svg>
                    </button>

                    <button class="nav-btn" onclick="navigate('next')"><img src="logos/icons/next.png" alt="Next" draggable="false"></button>
                    <button class="nav-btn" onclick="navigate('prev')"><img src="logos/icons/prev.png" alt="Previous" draggable="false"></button>
                    <a href="all-holdings.html" class="nav-btn"><img src="logos/icons/list.jpg" alt="All Holdings" draggable="false"></a>
                    <a href="index.html" class="nav-btn"><img src="logos/icons/home.png" alt="Home" draggable="false"></a>
                </div>

            </div>
        </div>
    </div>

<script>
    let currentStockData = null;
    let mcapChart = null;
    let currentHistory = [];

    function getFlagPath(nationality) {
        return nationality ? `logos/flags/${nationality}.png` : '';
    }

    async function displayStockByTicker(tickerSymbol) {
        try {
            const response = await fetch('stock-data.json');
            const stocks = await response.json();
            const stock = stocks.find(s => s.ticker.toUpperCase() === tickerSymbol.toUpperCase());

            if (!stock) {
                document.getElementById('main-container').innerHTML = `<p style="text-align:center;">Ticker not found.</p>`;
                return;
            }

            currentStockData = stock;
            document.getElementById('projection-card').style.display = 'block';
            document.getElementById('identity-card').style.display = 'block';
            document.getElementById('graph-card').style.display = 'block';
            document.getElementById('returns-card').style.display = 'block';
            
            const flagImg = document.getElementById('nation-flag');
            const flagPath = getFlagPath(stock.nationality);
            if (flagPath) {
                flagImg.src = flagPath;
                flagImg.style.display = 'block';
                flagImg.setAttribute('draggable', 'false'); 
                flagImg.onerror = function() { this.style.display = 'none'; }; 
            }

            document.getElementById('nation-name').innerText = stock.nationality || "N/A";
            document.getElementById('hq-location').innerText = `${stock.city || 'N/A'}, ${stock.state || ''}`;
            document.getElementById('stock-about').innerText = stock.about || "Description not available.";
            document.getElementById('stock-products').innerText = stock.products || "N/A";

            renderMainCard(stock);
            updateProjection();
            loadChartData(tickerSymbol);
            updateSectorTag(tickerSymbol);
            loadReturnsData(tickerSymbol);
            loadTickerData(tickerSymbol); 
            
        } catch (error) { console.error(error); }
    }

    // Adjusted Monthly Returns Calculation Engine tracking absolute capitalization shifts
    async function loadTickerData(ticker) {
        try {
            const response = await fetch('scroll-data.json');
            const scrollData = await response.json();
            const tickerUpper = ticker.toUpperCase();
            const monthlyRecords = [];

            const parseMonthKey = (key) => {
                const m = parseInt(key.substring(0, 2), 10);
                const y = parseInt(key.substring(2), 10);
                return { year: y, month: m, date: new Date(y, m - 1, 1) };
            };

            Object.keys(scrollData).forEach(monthKey => {
                const monthInfo = parseMonthKey(monthKey);
                const block = scrollData[monthKey];
                if (block && block.rows) {
                    const row = block.rows.find(r => r[0].toUpperCase() === tickerUpper);
                    if (row) {
                        const issueSize = parseFloat(row[1]);
                        const closePrice = parseFloat(row[2]);
                        if (!isNaN(issueSize) && !isNaN(closePrice) && closePrice > 0 && issueSize > 0) {
                            monthlyRecords.push({
                                label: monthKey,
                                year: monthInfo.year,
                                month: monthInfo.month,
                                date: monthInfo.date,
                                marketCap: issueSize * closePrice
                            });
                        }
                    }
                }
            });

            monthlyRecords.sort((a, b) => a.date - b.date);

            if (monthlyRecords.length < 2) {
                document.getElementById('ticker-panel-card').style.display = 'none';
                return;
            }

            const returnsData = [];
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

            for (let i = 1; i < monthlyRecords.length; i++) {
                const prev = monthlyRecords[i - 1];
                const curr = monthlyRecords[i];
                const percentageChange = ((curr.marketCap - prev.marketCap) / prev.marketCap) * 100;

                returnsData.push({
                    monthText: `${monthNames[curr.month - 1]} ${curr.year}`,
                    change: percentageChange
                });
            }

            // Slice out past 12 available return blocks
            const finalReturns = returnsData.slice(-12).reverse();

            if (finalReturns.length === 0) {
                document.getElementById('ticker-panel-card').style.display = 'none';
                return;
            }

            // Reference container ONCE
            const tickerContainer = document.getElementById('monthlyReturnsTicker');
            
            // Reset layout state and layout animation clearing
            tickerContainer.style.animation = 'none';
            tickerContainer.offsetHeight; // Force reflow
            tickerContainer.style.animation = '';
            
            // Build the string block for items
            let trackHTML = '';
            finalReturns.forEach(item => {
                const isPos = item.change >= 0;
                trackHTML += `
                    <div class="ticker-item">
                        <span class="ticker-month">${item.monthText}:</span>
                        <span class="${isPos ? 'positive' : 'negative'}">
                            ${isPos ? '▲ +' : '▼ '}${item.change.toFixed(2)}%
                        </span>
                    </div>
                `;
            });

            const separator = `<div class="ticker-item">📈</div>`;
            const fullContentSet = trackHTML + separator;

            // Populate twice for our mirror animation
            tickerContainer.innerHTML = fullContentSet + fullContentSet;
            document.getElementById('ticker-panel-card').style.display = 'block';

            // --- JAVASCRIPT ANIMATION ENGINE ---
            const wrapper = document.querySelector('.monthly-returns-ticker-wrap');
            // Start the scroll right at the edge of the visible panel wrapper
            let currentX = wrapper ? wrapper.offsetWidth : 0; 
            let speed = 2; 
            let isPaused = false;
            let animationFrameId = null;

            function scrollTicker() {
                if (!isPaused) {
                    currentX -= speed;
                    const halfWidth = tickerContainer.scrollWidth / 2;
                    
                    // Once the first loop set passes completely to the left, 
                    // seamlessly snap back to 0 to keep the closed loop going
                    if (currentX <= -halfWidth) {
                        currentX = 0;
                    }
                    
                    tickerContainer.style.transform = `translate3d(${currentX}px, 0, 0)`;
                }
                animationFrameId = requestAnimationFrame(scrollTicker);
            }

            // Clean up old runners
            if (window.activeTickerId) {
                cancelAnimationFrame(window.activeTickerId);
            }

            // Start loop
            scrollTicker();
            window.activeTickerId = animationFrameId;

            // Pause on Hover controls
            tickerContainer.onmouseenter = () => { isPaused = true; };
            tickerContainer.onmouseleave = () => { isPaused = false; };

        } catch (e) {
            console.error("Monthly returns ticker panel engine error.", e);
        }
    }

    async function loadReturnsData(ticker) {
        try {
            const response = await fetch('price-history.json');
            const data = await response.json();
            const prices = data[ticker.toUpperCase()];
            const grid = document.getElementById('returns-grid');
            grid.innerHTML = '';

            if (!prices) {
                document.getElementById('returns-card').style.display = 'none';
                return;
            }

            const years = Object.keys(prices).sort();
            const currentYear = new Date().getFullYear();
            let html = '';
            
            for (let i = 1; i < years.length; i++) {
                const prevYear = years[i-1];
                const currYear = years[i];
                
                let prev, curr, displayLabel;
                
                if (parseInt(currYear) === currentYear) {
                    prev = prices[currYear];  
                    curr = parseFloat(currentStockData.current.replace(/[^\d.]/g, ''));
                    displayLabel = 'YTD';
                } else {
                    prev = prices[prevYear];
                    curr = prices[currYear];
                    displayLabel = currYear;
                }
                
                if (prev === "#N/A" || curr === "#N/A" || !prev || !curr) continue;

                const diff = ((curr - prev) / prev) * 100;
                const isPos = diff >= 0;
                html = `
                    <div class="calendar-item ${isPos ? 'positive' : 'negative'}">
                        <div class="cal-year">${displayLabel}</div>
                        <div class="cal-perc ${isPos ? 'positive' : 'negative'}">
                            ${isPos ? '+' : ''}${diff.toFixed(1)}%
                        </div>
                    </div>
                ` + html;
            }
            grid.innerHTML = html || '<div style="font-size:11px; color:gray;">No data</div>';
        } catch (e) { console.log(e); }
    }

    async function updateSectorTag(ticker) {
        try {
            const response = await fetch('sector-data.json');
            const sectors = await response.json();
            const match = sectors.find(s => s.tickers.includes(ticker.toUpperCase()));
            const sectorElement = document.getElementById('sector-tag');
            if (match) {
                sectorElement.innerText = match.sector;
            } else {
                sectorElement.innerText = "Other";
                sectorElement.style.background = "#f0f0f0";
                sectorElement.style.color = "#999";
            }
        } catch (e) { console.log("Sector error", e); }
    }

    async function loadChartData(ticker) {
        try {
            const response = await fetch('mcap-data.json');
            const data = await response.json();
            const tickerUpper = ticker.toUpperCase();
            const historyArray = data[tickerUpper];

            if (historyArray && Array.isArray(historyArray)) {
                currentHistory = historyArray.map(item => {
                    const dateStr = item[0];
                    const dateObj = new Date(dateStr + "-01"); 
                    return {
                        date: dateStr,
                        rank: item[1],
                        label: dateObj.toLocaleString('default', { month: 'long', year: 'numeric' })
                    };
                });
                filterChart('12');
            } else if (mcapChart) mcapChart.destroy();
        } catch (error) { console.log(error); }
    }

    function filterChart(months) {
        let filteredData = (months === 'all') ? currentHistory : currentHistory.slice(0, months);
        const displayData = [...filteredData].reverse(); 
        const labels = displayData.map(item => item.label);
        const values = displayData.map(item => item.rank);
        renderChart(labels, values);
        const labelsMap = { 6: "6M", 12: "1Y", 60: "5Y", 'all': "ALL" };
        const targetText = labelsMap[months];
        document.querySelectorAll('.range-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText.trim() === targetText);
        });
    }

    function renderChart(labels, values) {
        const ctx = document.getElementById('mcapChart').getContext('2d');
        if (mcapChart) { mcapChart.destroy(); }
        const trendColor = values[values.length - 1] <= values[0] ? '#27ae60' : '#e74c3c';
        mcapChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Rank',
                    data: values,
                    borderColor: trendColor,
                    backgroundColor: 'transparent',
                    borderWidth: 2,
                    fill: false,
                    tension: 0.4,
                    pointRadius: 2,
                    pointHoverRadius: 5,
                    pointBackgroundColor: trendColor
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { reverse: true, grid: { color: '#edf2f7' }, ticks: { font: { size: 10 }, precision: 0, maxTicksLimit: 5 } },
                    x: { grid: { display: false }, ticks: { display: false } }
                }
            }
        });
    }

    function updateProjection() {
        if (!currentStockData) return;
        
        const years = parseInt(document.getElementById('year-slider').value);
        document.getElementById('year-val').innerText = years;
        
        let mappedPeriodBucket = "5";
        if (years > 25) mappedPeriodBucket = "30";
        else if (years > 20) mappedPeriodBucket = "25";
        else if (years > 15) mappedPeriodBucket = "20";
        else if (years > 10) mappedPeriodBucket = "15";
        else if (years > 5) mappedPeriodBucket = "10";

        let cagrStr = currentStockData.cagr; 
        if (liveCagrCache && liveCagrCache[mappedPeriodBucket] !== undefined) {
            cagrStr = liveCagrCache[mappedPeriodBucket];
        }

        const sanitizedCagrStr = cagrStr.replace(/[^-0-9.]/g, '');
        const cagr = parseFloat(sanitizedCagrStr) / 100;
        const contentDiv = document.getElementById('projection-content');
        const naDiv = document.getElementById('projection-na');

        if (isNaN(cagr) || cagr <= 0) {
            contentDiv.style.display = 'none';
            naDiv.style.display = 'block';
            return;
        } else {
            contentDiv.style.display = 'block';
            naDiv.style.display = 'none';
        }

        const buyPrice = parseFloat(currentStockData.buyPrice.replace(/[^\d.]/g, ''));
        const quantity = parseInt(currentStockData.quantity.replace(/[^\d.]/g, ''));
        const presentValue = buyPrice * quantity;
        const futureValue = presentValue * Math.pow((1 + cagr), years);
        document.getElementById('future-amt').innerText = formatIndianCurrency(futureValue);
    }

    function formatIndianCurrency(num) {
        const formatter = new Intl.NumberFormat('en-IN', { maximumFractionDigits: 2, minimumFractionDigits: 0 });
        if (num >= 10000000) return formatter.format(num / 10000000) + " Cr";
        if (num >= 100000) return formatter.format(num / 100000) + " Lakh";
        return formatter.format(num) + " /-";
    }

    function renderMainCard(stock) {
        const container = document.getElementById('main-container');
        const pnlClass = stock.profitLoss.includes('-') ? 'class="value negative"' : 'class="value positive"';
        const cagrClass = stock.cagr.includes('-') ? 'class="value negative"' : 'class="value positive"';
        const brokerLogoPath = `logos/broker/${stock.broker.toLowerCase().replace(/\s+/g, '-')}.png`;
        const y1Raw = stock["1y"] || "N/A";
        let outlookHTML = "";

        if (y1Raw.toUpperCase() === "N/A" || y1Raw.trim() === "") {
            outlookHTML = `<div class="outlook-container"> ⚠️ Forecast not available.</div>`;
        } else {
            const y1Num = parseFloat(y1Raw.replace(/[^-0-9.]/g, ''));
            const isPositive = y1Num >= 0;
            outlookHTML = `
                <div class="outlook-container">
                    In a year your investment may ${isPositive ? "grow" : "decline"} by 
                    <span style="color: ${isPositive ? "#27ae60" : "#e74c3c"}; font-weight: 700; margin-left: 4px;">
                        ${isPositive ? "▲" : "▼"} ${Math.abs(y1Num)}%
                    </span>
                </div>`;
        }

        container.innerHTML = `
            <div class="card-header">
                <div class="logo-box">
                    <a href="https://www.google.com/finance/beta/quote/${stock.ticker}:NSE" target="_blank">
                        <img src="${stock.logoUrl}" onerror="handleImageError(this, '${stock.logoUrl}')" draggable="false">
                    </a>
                </div>
                <h1>${stock.companyName}</h1>
                <p class="ticker-badge">${stock.ticker}</p>
                <span id="sector-tag" class="sector-badge">Loading Sector...</span>
            </div>
            <div class="info-table">
                <div class="table-caption">Holding Details</div>
                <div class="grid-row">
                    <div class="item"><label>Buy Date</label><div class="value">${stock.buyDate}</div></div>
                    <div class="item center"><label>Quantity</label><div class="value highlight">${stock.quantity}</div></div>
                    <div class="item right"><label>Buy Price</label><div class="value">${stock.buyPrice}</div></div>
                </div>
                <div class="grid-row">
                    <div class="item"><label>Abs. Returns</label><div class="value">${stock.absReturns}</div></div>
                    <div class="item center"><label>Profit/Loss</label><div ${pnlClass}>${stock.profitLoss}</div></div>
                    <div class="item right"><label>CAGR</label><div ${cagrClass}>${stock.cagr}</div></div>
                </div>
                <div class="grid-row footer-row">
                    <div class="item"><label>Broker</label><img src="${brokerLogoPath}" class="broker-banner" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" draggable="false"><div class="value" style="display:none;">${stock.broker}</div></div>
                    <div class="item center"><label>Period</label><div class="value">${stock.holdingPeriod}</div></div>
                    <div class="item right"><label>MCAP Rank</label><div class="value">${stock.mcapRank}</div></div>
                </div>
            </div>
            ${outlookHTML}                
        `;
    }

    function handleImageError(image, basePath) {
        const currentSrc = image.src.toLowerCase();
        if (!currentSrc.includes('.png') && !currentSrc.includes('.jpg') && !currentSrc.includes('.gif')) {
            image.src = basePath + '.png';
        } else if (currentSrc.endsWith('.png')) {
            image.src = basePath + '.jpg';
        } else if (currentSrc.endsWith('.jpg')) {
            image.src = basePath + '.gif';
        } else {
            image.src = 'https://via.placeholder.com/150?text=No+Logo';
            image.onerror = null; 
        }
    }

    async function navigate(direction) {
        const response = await fetch('stock-data.json');
        const stocks = await response.json();
        const validStocks = stocks.filter(s => (String(s.mcapRank || "").replace(/\D/g, '')) !== "");
        const sorted = validStocks.sort((a, b) => parseInt(a.mcapRank.replace(/\D/g, '')) - parseInt(b.mcapRank.replace(/\D/g, '')));
        const currentTicker = (new URLSearchParams(window.location.search).get('ticker') || 'RELIANCE').toLowerCase();
        const idx = sorted.findIndex(s => s.ticker.toLowerCase() === currentTicker);
        let next = direction === 'next' ? (idx + 1) % sorted.length : (idx - 1 + sorted.length) % sorted.length;
        window.location.search = `?ticker=${encodeURIComponent(sorted[next].ticker)}`;
    }

    let touchstartX = 0;
    let touchendX = 0;
    const minSwipeDistance = 50;

    function handleGesture() {
        if (window.innerWidth <= 1400) {
            if (touchstartX - touchendX > minSwipeDistance) {
                navigate('next');
            }
            if (touchendX - touchstartX > minSwipeDistance) {
                navigate('prev');
            }
        }
    }

    document.addEventListener('touchstart', e => {
        touchstartX = e.changedTouches[0].screenX;
    }, { passive: true });

    document.addEventListener('touchend', e => {
        touchendX = e.changedTouches[0].screenX;
        handleGesture();
    }, { passive: true });

    const slider = document.getElementById('year-slider');
    if (slider) {
        ['touchstart', 'touchend'].forEach(eventType => {
            slider.addEventListener(eventType, e => {
                e.stopPropagation();
            }, { passive: true });
        });
    }

    window.onload = () => {
        const ticker = new URLSearchParams(window.location.search).get('ticker') || 'RELIANCE';
        displayStockByTicker(ticker);
    };

    const searchModalOverlay = document.getElementById('searchModalOverlay');
    const searchTrigger = document.getElementById('searchTrigger');
    const searchInput = document.getElementById('searchInput');

    searchTrigger.addEventListener('click', (e) => {
        e.stopPropagation();
        searchModalOverlay.classList.add('active');
        searchInput.value = '';
        setTimeout(() => searchInput.focus(), 50);
    });

    searchModalOverlay.addEventListener('click', (e) => {
        if (e.target === searchModalOverlay) {
            closeSearchModal();
        }
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && searchModalOverlay.classList.contains('active')) {
            closeSearchModal();
        }
    });

    function closeSearchModal() {
        searchModalOverlay.classList.remove('active');
        searchInput.blur();
        const suggestionsMenu = document.querySelector('.search-suggestions');
        if (suggestionsMenu) suggestionsMenu.style.display = 'none';
    }
</script>

<script>
    const GOOGLE_SCRIPT_API_URL = "https://script.google.com/macros/s/AKfycbxhI8i8Z2tDhU3irhtW_KGlc1fnXr2FvCAlA6quldRpnjt7xMN4BaX-2gWafmFXbu-O/exec";
    
    let liveCagrCache = null;
    let currentActiveTokenId = 0;

    function displayAllCachedBubbleValues() {
        const metrics = ["5", "10", "15", "20", "25", "30"];
        metrics.forEach(year => {
            const targetSpan = document.getElementById(`bval-${year}`);
            if (!targetSpan) return;

            if (!liveCagrCache || liveCagrCache[year] === undefined) {
                targetSpan.textContent = "--";
                targetSpan.style.color = "var(--text-light)";
                return;
            }

            const rawVal = liveCagrCache[year];
            let numericVal = parseFloat(rawVal.replace(/[^-0-9.]/g, ''));
            if (!isNaN(numericVal)) {
                let roundedVal = Math.round(numericVal);
                let finalVal = (roundedVal >= 0 ? '+' : '') + roundedVal + '%';
                targetSpan.textContent = finalVal;
                targetSpan.style.color = roundedVal >= 0 ? '#2e7d32' : '#c62828';
            } else {
                targetSpan.textContent = rawVal === "N/A" ? "N/A" : "--";
                targetSpan.style.color = 'var(--text-light)';
            }
        });
        
        updateProjection();
    }

    function toggleCardLoadingState(isLoading) {
        const navSidebar = document.getElementById('main-nav-sidebar');
        const fetchBtn = document.getElementById('fetch-live-cagr-btn');
        const metrics = ["5", "10", "15", "20", "25", "30"];

        if (isLoading) {
            metrics.forEach(year => {
                const targetSpan = document.getElementById(`bval-${year}`);
                if (targetSpan) targetSpan.innerHTML = '<div class="cagr-card-spinner"></div>';
            });
            if (navSidebar) navSidebar.classList.add('ui-disabled');
            if (fetchBtn) fetchBtn.classList.add('ui-disabled');
        } else {
            if (navSidebar) navSidebar.classList.remove('ui-disabled');
            if (fetchBtn) fetchBtn.classList.remove('ui-disabled');
        }
    }

    function triggerLiveCagrFetchManual() {
        if (!currentStockData) return;
        
        toggleCardLoadingState(true);
        document.getElementById('cagr-fetch-prompt-container').style.display = 'none';
        document.getElementById('cagr-interactive-selector-container').style.display = 'block';
        fetchLiveSheetCAGR(currentStockData.ticker);
    }

    async function fetchLiveSheetCAGR(ticker) {
        liveCagrCache = null; 
        currentActiveTokenId++;
        const capturedInstanceToken = currentActiveTokenId;

        try {
            const response = await fetch(`${GOOGLE_SCRIPT_API_URL}?ticker=${encodeURIComponent(ticker)}`);
            const data = await response.json();
            
            if (capturedInstanceToken !== currentActiveTokenId) return;

            if (data && !data.error) {
                liveCagrCache = data;
                displayAllCachedBubbleValues();
            } else {
                fallbackToDefaultBadge();
            }
        } catch (e) {
            console.log("On-demand sheet bridge lookup connection failed, using fallback.", e);
            if (capturedInstanceToken === currentActiveTokenId) {
                fallbackToDefaultBadge();
            }
        } finally {
            if (capturedInstanceToken === currentActiveTokenId) {
                toggleCardLoadingState(false);
            }
        }
    }

    function fallbackToDefaultBadge() {
        if (currentStockData) {
            liveCagrCache = { 
                "5": currentStockData.cagr, 
                "10": currentStockData.cagr, 
                "15": currentStockData.cagr, 
                "20": currentStockData.cagr, 
                "25": currentStockData.cagr, 
                "30": currentStockData.cagr 
            };
            displayAllCachedBubbleValues();
        }
    }

    function resetCagrCardToPromptState() {
        currentActiveTokenId++; 
        liveCagrCache = null;
        
        document.getElementById('cagr-interactive-selector-container').style.display = 'none';
        document.getElementById('cagr-fetch-prompt-container').style.display = 'flex';
        
        const metrics = ["5", "10", "15", "20", "25", "30"];
        metrics.forEach(year => {
            const targetSpan = document.getElementById(`bval-${year}`);
            if (targetSpan) targetSpan.textContent = "--";
        });
        
        toggleCardLoadingState(false);
    }

    const baseDisplayStockByTicker = displayStockByTicker;
    displayStockByTicker = async function(tickerSymbol) {
        document.getElementById('cagr-selector-card').style.display = 'block';
        resetCagrCardToPromptState();
        await baseDisplayStockByTicker(tickerSymbol);
    };

    const baseUpdateProjection = updateProjection;
    updateProjection = function() {
        baseUpdateProjection();
    };
</script>
